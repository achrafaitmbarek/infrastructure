deploy-aws:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client aws-cli
    - eval $(ssh-agent -s)
    - chmod 400 $SSH_PRIVATE_KEY
    - ssh-add $SSH_PRIVATE_KEY
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    # n passe les variables AWS à la VM pendant la connexion SSH pour le login EC R
    - ssh -o StrictHostKeyChecking=no ubuntu@${EC2_HOST} "
      export AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID} &&
      export AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY} &&
      export AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION} &&
      export EC2_HOST=${EC2_HOST} &&
      export DB_USER=${DB_USER} &&
      export DB_PASSWORD=${DB_PASSWORD} &&
      export KC_ADMIN_USER=${KC_ADMIN_USER} &&
      export KC_ADMIN_PASSWORD=${KC_ADMIN_PASSWORD} &&
      export EC2_HOST=${EC2_HOST} &&
      export KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET} &&
      cd /home/ubuntu/infrastructure &&
      git pull origin main &&
      aws ecr get-login-password --region \$AWS_DEFAULT_REGION | docker login --username AWS --password-stdin ${AWS_ECR_REGISTRY} &&
      docker compose -f docker-compose.aws.yml down &&
      docker compose -f docker-compose.aws.yml pull &&
      docker compose -f docker-compose.aws.yml up -d &&
      docker system prune -af"
  only:
    - main